name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: "Publish to Visual Studio Marketplace if VSCE_PAT is configured"
        required: false
        default: false
        type: boolean
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: |
          mkdir -p dist/vsix
          npx vsce package --out "dist/vsix/kotonia-agent.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotonia-agent
          path: dist/vsix/*.vsix
          if-no-files-found: error

      - name: Publish GitHub release asset (tagged version)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vsix/*.vsix
          fail_on_unmatched_files: true

      # Rolling "latest" prerelease so there is always a directly downloadable
      # VSIX (Install from VSIX) without cutting a version tag.
      - name: Update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: dist/vsix/*.vsix
          fail_on_unmatched_files: true

  publish-marketplace:
    needs: package
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_marketplace == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          path: dist/published-vsix
          pattern: kotonia-agent
          merge-multiple: true

      # Non-fatal: the publisher is pending Marketplace review ("suspicious
      # content" gate for first-time publishers). Keep the rest of the pipeline
      # (and the downloadable release) green until it's unblocked.
      - name: Publish Marketplace package
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "VSCE_PAT is not configured; skipping Marketplace publish."
            exit 0
          fi
          npx vsce publish --packagePath dist/published-vsix/*.vsix
